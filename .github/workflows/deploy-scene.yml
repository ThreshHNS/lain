name: Deploy Scene

on:
  push:
    branches: [main]
    paths:
      - 'lain-scene/**'
      - '.github/workflows/deploy-scene.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Scene Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './lain-scene'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
