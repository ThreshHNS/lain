name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'lain-app/**'
      - 'lain-scene/**'
      - '.github/workflows/deploy-scene.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lain-app/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install App Dependencies
        working-directory: ./lain-app
        run: npm ci

      - name: Build PWA
        working-directory: ./lain-app
        env:
          EXPO_BASE_URL: /${{ github.event.repository.name }}/app
        run: npm run build:web

      - name: Assemble Pages Artifact
        run: |
          mkdir -p _site/app
          cp lain-scene/.nojekyll _site/.nojekyll
          cp lain-scene/index.html _site/index.html
          cp lain-scene/mode-switcher.css _site/mode-switcher.css
          cp lain-scene/mode-switcher.js _site/mode-switcher.js
          cp lain-scene/slasher.html _site/slasher.html
          cp -R lain-scene/awp _site/awp
          cp -R lain-scene/slasher _site/slasher
          cp -R lain-app/dist/. _site/app/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
