<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>lain slasher redirect</title>
    <script>
      (() => {
        const nextUrl = new URL('./slasher/', window.location.href);
        const params = new URLSearchParams(window.location.search);
        params.delete('mode');
        nextUrl.search = params.toString();
        nextUrl.hash = window.location.hash;
        window.location.replace(nextUrl.toString());
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #050305;
        color: #ffe7df;
        font-family: Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to the canonical slasher route. If nothing happens, open <a href="./slasher/">/slasher/</a>.</p>
  </body>
</html>
