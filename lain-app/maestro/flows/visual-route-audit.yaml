appId: com.avelts.lain
tags:
  - screenshots
  - audit
  - routes
---
- launchApp:
    clearState: true
- tapOn:
    text: Cancel
    optional: true
- assertVisible:
    id: scene-feed-screen
- assertVisible:
    id: scene-open-awp
- assertVisible:
    id: active-scene-tab-button
- assertVisible:
    id: prompt-history-tab-button
- assertVisible:
    id: scene-editor-tab-button
- takeScreenshot: audit-home-awp-valid
- tapOn:
    id: scene-open-awp
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: audit-game-awp-shell-check
- takeScreenshot: audit-game-awp-valid
- tapOn:
    point: 77%,6%
- takeScreenshot: audit-editor-awp-transition
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: editor-chat-shell
- assertVisible:
    id: editor-close-button
- takeScreenshot: audit-editor-awp-valid
- tapOn:
    point: 92%,6%
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    point: 89%,6%
- assertVisible:
    id: scene-feed-screen
- tapOn:
    id: scene-feed-dot-slasher
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: scene-open-slasher
- takeScreenshot: audit-home-slasher-valid
- tapOn:
    id: scene-open-slasher
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: audit-game-slasher-shell-check
- takeScreenshot: audit-game-slasher-valid
- tapOn:
    point: 77%,6%
- takeScreenshot: audit-editor-slasher-transition
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: editor-chat-shell
- assertVisible:
    id: editor-close-button
- takeScreenshot: audit-editor-slasher-valid
