appId: com.avelts.lain
tags:
  - fallback
  - p0
  - screenshots
---
- launchApp:
    clearState: true
- tapOn:
    text: Cancel
    optional: true
- tapOn:
    id: scene-break-button
- extendedWaitUntil:
    visible:
      id: scene-preview-awp-status-error
    timeout: 10000
- assertVisible: Scene unavailable
- takeScreenshot: route-home-preview-awp-error
- tapOn:
    id: scene-preview-awp-retry-button
- extendedWaitUntil:
    visible:
      id: scene-preview-awp-status-ready
    timeout: 15000
- takeScreenshot: route-home-preview-awp-recovered
