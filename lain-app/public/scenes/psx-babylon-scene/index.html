<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSX SCENE // BABYLON.JS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  #renderCanvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.08) 0px,
      rgba(0,0,0,0.08) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none; z-index: 20;
  }
  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none; z-index: 21;
  }
  #info {
    position: fixed; bottom: 20px; left: 20px;
    color: #ff3300; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; z-index: 30;
    text-shadow: 0 0 8px #ff3300;
    pointer-events: none;
  }
  #title {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%);
    color: #cccccc; font-size: 11px; letter-spacing: 6px;
    text-transform: uppercase; z-index: 30;
    text-shadow: 0 0 12px rgba(255,255,255,0.3);
    opacity: 0.7;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="title">PSX BABYLON SCENE</div>
<div id="info">FPS: --</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, false, {
  preserveDrawingBuffer: true,
  stencil: true,
  antialias: false
});

engine.setHardwareScalingLevel(3);

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02, 0.01, 0.04, 1);
scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
scene.fogDensity = 0.04;
scene.fogColor = new BABYLON.Color3(0.04, 0.01, 0.08);

// Camera
const camera = new BABYLON.FreeCamera('cam', new BABYLON.Vector3(0, 2, -8), scene);
camera.setTarget(new BABYLON.Vector3(0, 1, 0));
camera.attachControl(canvas, true);
camera.speed = 0.15;
camera.minZ = 0.1;
camera.maxZ = 60;
camera.keysUp = [87]; camera.keysDown = [83];
camera.keysLeft = [65]; camera.keysRight = [68];

// Lights
const ambient = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0, 1, 0), scene);
ambient.intensity = 0.15;
ambient.groundColor = new BABYLON.Color3(0.1, 0.0, 0.15);
ambient.diffuse = new BABYLON.Color3(0.2, 0.1, 0.3);

const point1 = new BABYLON.PointLight('p1', new BABYLON.Vector3(0, 3, 0), scene);
point1.diffuse = new BABYLON.Color3(0.4, 0.1, 0.8);
point1.intensity = 1.5;
point1.range = 15;

const point2 = new BABYLON.PointLight('p2', new BABYLON.Vector3(-5, 1, 3), scene);
point2.diffuse = new BABYLON.Color3(0.0, 0.5, 0.8);
point2.intensity = 0.8;
point2.range = 10;

const point3 = new BABYLON.PointLight('p3', new BABYLON.Vector3(5, 1, 3), scene);
point3.diffuse = new BABYLON.Color3(0.8, 0.1, 0.1);
point3.intensity = 0.6;
point3.range = 10;

// PSX material helper
function psxMat(name, r, g, b) {
  const mat = new BABYLON.StandardMaterial(name, scene);
  mat.diffuseColor = new BABYLON.Color3(r, g, b);
  mat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
  mat.specularPower = 4;
  return mat;
}

// Floor
const floor = BABYLON.MeshBuilder.CreateGround('floor', {width: 40, height: 40, subdivisions: 2}, scene);
floor.material = psxMat('floorMat', 0.05, 0.02, 0.08);

// Floor grid lines
const gridMat = new BABYLON.StandardMaterial('grid', scene);
gridMat.wireframe = true;
gridMat.emissiveColor = new BABYLON.Color3(0.15, 0.05, 0.25);
const floorGrid = BABYLON.MeshBuilder.CreateGround('floorGrid', {width: 40, height: 40, subdivisions: 20}, scene);
floorGrid.material = gridMat;
floorGrid.position.y = 0.01;

// GLB model
BABYLON.SceneLoader.ImportMesh(
  '',
  '../assets/models/',
  'ping.glb',
  scene,
  function(meshes) {
    meshes.forEach(mesh => {
      if (!mesh.material) return;
      mesh.material.backFaceCulling = false;
      mesh.material.transparencyMode = BABYLON.Material.MATERIAL_OPAQUE;
      if (mesh.material.albedoTexture) {
        mesh.material.albedoTexture.hasAlpha = false;
      }
    });
  }
);

// Central obelisk
const obelisk = BABYLON.MeshBuilder.CreateBox('obelisk', {width: 0.8, height: 6, depth: 0.8}, scene);
obelisk.position = new BABYLON.Vector3(0, 3, 0);
obelisk.material = psxMat('obeliskMat', 0.08, 0.04, 0.12);

// Floating crystals
const crystalPositions = [
  [-2, 0.5, 0], [2, 1, 0], [0, 0.8, -2], [0, 1.2, 2],
  [-1.5, 2, 1.5], [1.5, 1.5, -1.5]
];
crystalPositions.forEach((pos, i) => {
  const crystal = BABYLON.MeshBuilder.CreatePolyhedron(`crystal${i}`, {
    type: 3, size: 0.3 + Math.random() * 0.3
  }, scene);
  crystal.position = new BABYLON.Vector3(...pos);
  crystal.rotation = new BABYLON.Vector3(Math.random()*6, Math.random()*6, Math.random()*6);
  const colors = [[0.3,0.1,0.8],[0.0,0.4,0.9],[0.8,0.1,0.5],[0.1,0.7,0.5]];
  const c = colors[i % colors.length];
  const cMat = new BABYLON.StandardMaterial(`crystalMat${i}`, scene);
  cMat.emissiveColor = new BABYLON.Color3(c[0]*0.5, c[1]*0.5, c[2]*0.5);
  cMat.diffuseColor = new BABYLON.Color3(c[0], c[1], c[2]);
  cMat.alpha = 0.85;
  crystal.material = cMat;
  crystal._orbitSpeed = 0.3 + Math.random() * 0.5;
  crystal._orbitRadius = 1.5 + Math.random() * 1.5;
  crystal._orbitAngle = (i / crystalPositions.length) * Math.PI * 2;
  crystal._orbitHeight = pos[1];
});

// Ruins
function createWall(x, z, ry, w, h) {
  const wall = BABYLON.MeshBuilder.CreateBox('wall', {width: w, height: h, depth: 0.2}, scene);
  wall.position = new BABYLON.Vector3(x, h/2, z);
  wall.rotation.y = ry;
  wall.material = psxMat('wallMat', 0.06, 0.03, 0.09);
}
createWall(-6, -3, 0.2, 3, 2.5);
createWall(6, -3, -0.3, 2, 3.5);
createWall(-7, 3, 1.8, 4, 1.8);
createWall(5, 5, 0.5, 3, 2.2);
createWall(0, -6, 0, 5, 1.5);

// Floating debris
for (let i = 0; i < 20; i++) {
  const debris = BABYLON.MeshBuilder.CreateBox(`d${i}`, {
    width: 0.1 + Math.random()*0.4,
    height: 0.1 + Math.random()*0.3,
    depth: 0.1 + Math.random()*0.4
  }, scene);
  debris.position = new BABYLON.Vector3(
    (Math.random()-0.5)*16, 0.5 + Math.random()*4, (Math.random()-0.5)*16
  );
  debris.rotation = new BABYLON.Vector3(Math.random()*6, Math.random()*6, Math.random()*6);
  debris.material = psxMat(`dm${i}`, 0.07, 0.03, 0.1);
  debris._floatOffset = Math.random() * Math.PI * 2;
  debris._floatSpeed = 0.3 + Math.random() * 0.5;
  debris._baseY = debris.position.y;
}

// Emissive sparks
for (let i = 0; i < 30; i++) {
  const spark = BABYLON.MeshBuilder.CreateSphere(`spark${i}`, {diameter: 0.06}, scene);
  spark.position = new BABYLON.Vector3(
    (Math.random()-0.5)*20, 0.3 + Math.random()*5, (Math.random()-0.5)*20
  );
  const sm = new BABYLON.StandardMaterial(`spm${i}`, scene);
  const hue = Math.random();
  sm.emissiveColor = new BABYLON.Color3(
    hue < 0.33 ? 0.8 : 0.1,
    hue > 0.33 && hue < 0.66 ? 0.6 : 0.1,
    hue > 0.66 ? 0.9 : 0.2
  );
  spark.material = sm;
  spark._floatOffset = Math.random() * Math.PI * 2;
  spark._floatSpeed = 0.5 + Math.random();
  spark._baseY = spark.position.y;
}

// Post-processing
const pipeline = new BABYLON.DefaultRenderingPipeline('pipeline', false, scene, [camera]);
pipeline.bloomEnabled = true;
pipeline.bloomThreshold = 0.4;
pipeline.bloomWeight = 0.6;
pipeline.bloomKernel = 16;
pipeline.bloomScale = 0.3;
pipeline.chromaticAberrationEnabled = true;
pipeline.chromaticAberration.aberrationAmount = 2;
pipeline.grainEnabled = true;
pipeline.grain.intensity = 20;
pipeline.grain.animated = true;

// Animation loop
let t = 0;
const infoEl = document.getElementById('info');
scene.registerBeforeRender(() => {
  t += engine.getDeltaTime() * 0.001;

  scene.meshes.forEach(m => {
    if (m.name.startsWith('crystal') && m._orbitSpeed) {
      m._orbitAngle += m._orbitSpeed * engine.getDeltaTime() * 0.001;
      m.position.x = Math.cos(m._orbitAngle) * m._orbitRadius;
      m.position.z = Math.sin(m._orbitAngle) * m._orbitRadius;
      m.position.y = m._orbitHeight + Math.sin(t * m._orbitSpeed * 2) * 0.3;
      m.rotation.y += 0.02;
    }
    if ((m.name.startsWith('d') || m.name.startsWith('spark')) && m._baseY !== undefined) {
      m.position.y = m._baseY + Math.sin(t * m._floatSpeed + m._floatOffset) * 0.15;
      m.rotation.x += 0.005 * m._floatSpeed;
      m.rotation.z += 0.003 * m._floatSpeed;
    }
  });

  point1.intensity = 1.2 + Math.sin(t * 1.5) * 0.4;
  point2.intensity = 0.7 + Math.sin(t * 2.3 + 1) * 0.3;
  point3.intensity = 0.5 + Math.sin(t * 1.8 + 2) * 0.25;
  point1.position.x = Math.sin(t * 0.5) * 2;
  point1.position.z = Math.cos(t * 0.5) * 2;

  if (Math.floor(t * 2) % 2 === 0) {
    infoEl.textContent = `FPS: ${Math.round(engine.getFps())} // PSX BABYLON`;
  }
});

engine.runRenderLoop(() => scene.render());
window.addEventListener('resize', () => engine.resize());
</script>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var embedded=p.get('embedded')==='1';
  var preview=p.get('preview')==='1';
  if(embedded){
    var mc=document.getElementById('mode-chip');
    if(mc)mc.style.display='none';
  }
  if(preview){
    var h=document.getElementById('hud');if(h)h.style.display='none';
    var hi=document.getElementById('hint');if(hi)hi.style.display='none';
    var tc=document.getElementById('touch-controls');if(tc)tc.style.display='none';
  }
})();
</script>
</body>
</html>
