<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>tomato-grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #10151d; overflow: hidden; font-family: monospace; }
  #renderCanvas { width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }
  #scanlines, #vignette, #damage, #reggae {
    position: fixed; inset: 0; pointer-events: none;
  }
  #scanlines {
    z-index: 10;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 3px);
  }
  #vignette {
    z-index: 11;
    background: radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.58) 100%);
  }
  #damage { z-index: 12; background: rgba(180, 0, 0, 0); }
  #reggae {
    z-index: 13;
    background: transparent;
    mix-blend-mode: screen;
    opacity: 0;
  }
  #title, #hud, #legend, #stolenBanner {
    position: fixed; z-index: 20; pointer-events: none; text-transform: uppercase;
    text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
  }
  #title {
    top: 18px; left: 50%; transform: translateX(-50%);
    color: #dbe4ed; font-size: 12px; letter-spacing: 6px;
  }
  #hud {
    left: 18px; bottom: 18px; color: #ffd4a3; font-size: 10px; letter-spacing: 2px; line-height: 1.7;
  }
  #legend {
    right: 18px; bottom: 18px; color: #a9b5c6; font-size: 9px; letter-spacing: 2px; line-height: 1.7; text-align: right;
  }
  #stolenBanner {
    left: 50%; top: 50%; z-index: 24;
    color: #f7f3e8; font-size: 24px; letter-spacing: 6px;
    opacity: 0; transform: translate(-50%, -50%) scale(0.92);
  }
  #stolenBanner.active {
    opacity: 1;
    animation: stolenPulse 0.9s ease-in-out infinite alternate;
  }
  @keyframes stolenPulse {
    from { transform: translate(-50%, -50%) scale(0.96); filter: brightness(0.95); }
    to { transform: translate(-50%, -50%) scale(1.02); filter: brightness(1.15); }
  }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="damage"></div>
<div id="reggae"></div>
<div id="title">tomato-grid</div>
<div id="hud">STOPPED 0 // STOLEN 0 // HP 5 // TARGET A1<br>ПОБИТО ВРАГОВ 0 // СПАСЕНО УРОЖАЯ ₽0</div>
<div id="legend">WASD OR ARROWS PICK CELL<br>SPACE OR ENTER ATTACK</div>
<div id="stolenBanner">Ваши помидоры украли</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="../engine/sprite.js"></script>

<script>
const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, false, { preserveDrawingBuffer: true, stencil: true, antialias: false });
engine.setHardwareScalingLevel(4);

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.94, 0.94, 0.96, 1);
scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
scene.fogDensity = 0.022;
scene.fogColor = new BABYLON.Color3(0.94, 0.94, 0.96);
scene.ambientColor = new BABYLON.Color3(0.18, 0.19, 0.2);

const camera = new BABYLON.FreeCamera('cam', new BABYLON.Vector3(0, 18, -18), scene);
camera.setTarget(new BABYLON.Vector3(0, 0.8, 0));
camera.minZ = 0.1;
camera.maxZ = 60;

const moon = new BABYLON.HemisphericLight('moon', new BABYLON.Vector3(0.1, 1, -0.2), scene);
moon.intensity = 0.62;
moon.diffuse = new BABYLON.Color3(0.92, 0.94, 0.96);
moon.groundColor = new BABYLON.Color3(0.12, 0.12, 0.13);

const arenaLamp = new BABYLON.PointLight('arenaLamp', new BABYLON.Vector3(0, 4.5, 0), scene);
arenaLamp.intensity = 1.8;
arenaLamp.diffuse = new BABYLON.Color3(0.96, 0.88, 0.74);
arenaLamp.range = 22;

const pipeline = new BABYLON.DefaultRenderingPipeline('pp', false, scene, [camera]);
pipeline.bloomEnabled = true;
pipeline.bloomThreshold = 0.42;
pipeline.bloomWeight = 0.28;
pipeline.bloomKernel = 18;
pipeline.bloomScale = 0.45;
pipeline.chromaticAberrationEnabled = true;
pipeline.chromaticAberration.aberrationAmount = 1.05;
pipeline.grainEnabled = true;
pipeline.grain.intensity = 9;
pipeline.grain.animated = true;

function c(r, g, b) { return new BABYLON.Color3(r, g, b); }
function mat(name, rgb, em) {
  const m = new BABYLON.StandardMaterial(name, scene);
  m.diffuseColor = c(rgb[0], rgb[1], rgb[2]);
  m.specularColor = c(0.03, 0.03, 0.03);
  m.specularPower = 4;
  m.emissiveColor = em ? c(em[0], em[1], em[2]) : c(0, 0, 0);
  return m;
}

const mats = {
  ground: mat('ground', [0.12, 0.15, 0.18]),
  board: mat('board', [0.18, 0.2, 0.16]),
  cell: mat('cell', [0.24, 0.22, 0.18]),
  center: mat('center', [0.18, 0.28, 0.24], [0.03, 0.08, 0.06]),
  selected: mat('selected', [0.42, 0.3, 0.18], [0.16, 0.08, 0.03]),
  threat: mat('threat', [0.4, 0.12, 0.1], [0.18, 0.04, 0.02]),
  strike: mat('strike', [1.0, 0.74, 0.18], [0.34, 0.18, 0.04])
};
mats.strike.alpha = 0.42;

BABYLON.MeshBuilder.CreateGround('ground', { width: 26, height: 26 }, scene).material = mats.ground;
const board = BABYLON.MeshBuilder.CreateBox('board', { width: 16.8, depth: 16.8, height: 0.5 }, scene);
board.position.y = 0.14;
board.material = mats.board;

const cells = [];
const cellMap = {};
const tomatoSpots = [];
const tomatoScaleVariants = [3.0, 3.64, 4.28, 5.0];
const spacing = 5.1;
function cellId(row, col) { return String.fromCharCode(65 + col) + (row + 1); }
function shuffle(list) {
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = list[i];
    list[i] = list[j];
    list[j] = tmp;
  }
  return list;
}
function registerTomatoCluster(cell) {
  const offsets = shuffle([
    [-1.16, -1.1], [0, -1.16], [1.12, -1.02],
    [-1.22, 0.18], [0.18, 0.08], [1.06, 0.94]
  ]);
  const scales = shuffle([0, 1, 2, 3, 1, 2]);
  const count = (cell.row + cell.col) % 2 === 0 ? 5 : 6;
  for (let i = 0; i < count; i++) {
    tomatoSpots.push({
      x: cell.x + offsets[i][0] + (Math.random() - 0.5) * 0.12,
      y: 1.12,
      z: cell.z + offsets[i][1] + (Math.random() - 0.5) * 0.12,
      scale: tomatoScaleVariants[scales[i]] + (Math.random() - 0.5) * 0.12,
      rotationY: Math.PI / 2 + (Math.random() - 0.5) * 0.28,
      seed: Math.random() * Math.PI * 2,
      mesh: null
    });
  }
}

for (let row = 0; row < 3; row++) {
  for (let col = 0; col < 3; col++) {
    const x = (col - 1) * spacing;
    const z = (row - 1) * spacing;
    const tile = BABYLON.MeshBuilder.CreateBox('tile_' + row + '_' + col, { width: 4.4, depth: 4.4, height: 0.34 }, scene);
    tile.position.set(x, 0.46, z);
    const center = row === 1 && col === 1;
    tile.material = center ? mats.center : mats.cell;
    const cell = { row, col, x, z, id: cellId(row, col), center, tile };
    cells.push(cell);
    cellMap[row + '_' + col] = cell;
    if (!center) registerTomatoCluster(cell);
  }
}

BABYLON.SceneLoader.ImportMesh('', '../assets/models/', 'tomato_plant.glb', scene, function(meshes) {
  const sourceMesh = meshes.find(function(mesh) { return mesh.getTotalVertices && mesh.getTotalVertices() > 0; });
  if (!sourceMesh) return;
  meshes.forEach(function(mesh) { mesh.isPickable = false; mesh.alwaysSelectAsActiveMesh = false; });
  sourceMesh.name = 'gridTomatoSource';
  sourceMesh.isVisible = false;
  sourceMesh.position.set(0, -200, 0);
  if (sourceMesh.material) {
    sourceMesh.material = sourceMesh.material.clone('gridTomatoMaterial');
    sourceMesh.material.backFaceCulling = false;
    if ('fogEnabled' in sourceMesh.material) sourceMesh.material.fogEnabled = false;
    if ('albedoColor' in sourceMesh.material) {
      sourceMesh.material.albedoColor = c(0.22, 0.5, 0.16);
      sourceMesh.material.emissiveColor = c(0.08, 0.16, 0.05);
      sourceMesh.material.metallic = 0;
      sourceMesh.material.roughness = 1;
    }
    if ('diffuseColor' in sourceMesh.material) {
      sourceMesh.material.diffuseColor = c(0.22, 0.5, 0.16);
      sourceMesh.material.emissiveColor = c(0.08, 0.16, 0.05);
    }
    if ('specularColor' in sourceMesh.material) sourceMesh.material.specularColor = c(0.03, 0.03, 0.03);
  }
  for (let i = 0; i < tomatoSpots.length; i++) {
    const spot = tomatoSpots[i];
    const mesh = sourceMesh.createInstance('gridTomato_' + i);
    mesh.isPickable = false;
    mesh.alwaysSelectAsActiveMesh = false;
    mesh.position.set(spot.x, spot.y, spot.z);
    mesh.rotation.y = spot.rotationY;
    mesh.scaling.setAll(spot.scale);
    spot.mesh = mesh;
  }
});

const selector = BABYLON.MeshBuilder.CreateGround('selector', { width: 4.6, height: 4.6 }, scene);
selector.position.y = 0.64;
selector.material = mats.selected;

const strike = BABYLON.MeshBuilder.CreateGround('strike', { width: 4.0, height: 4.0 }, scene);
strike.position.y = 0.66;
strike.material = mats.strike;
strike.isVisible = false;

const hudEl = document.getElementById('hud');
const damageEl = document.getElementById('damage');
const reggaeEl = document.getElementById('reggae');
const stolenBannerEl = document.getElementById('stolenBanner');

const playerSprite = PSXSprite(scene, {
  name: 'jmyh_grid',
  texture: '../assets/sprites/jmyh.png',
  cellW: 507,
  cellH: 576,
  cols: 9,
  rows: 1,
  width: 5.0,
  height: 4.0,
  pos: [0, 2.15, 0],
  anims: {
    sit: [0, 3],
    walk: [4, 6],
    attack: [7, 8]
  }
});

let selection = cellMap['0_0'];
let playerFacing = Math.atan2(selection.x, selection.z);
let playerAnim = 'sit';
let attackTimer = 0;
let attackCooldown = 0;
let damageFlash = 0;
let reggaeTimer = 0;
let reggaeDuration = 1;
let reggaeStrength = 0;
let stopped = 0;
let stolen = 0;
const harvestReward = 120;
let savedHarvestValue = 0;
let guardHP = 5;
let isRespawning = false;
let respawnTimer = 0;
let spawnTimer = 0;
let enemy = null;
let lastSpawnId = '';

function setPlayerAnim(next) {
  if (playerAnim === next) return;
  playerAnim = next;
  if (next === 'attack') playerSprite.play('attack', 8); else playerSprite.play('sit', 2);
}

function triggerReggae(strength, duration) {
  reggaeStrength = Math.max(reggaeStrength, strength);
  reggaeDuration = Math.max(1, duration || 280);
  reggaeTimer = reggaeDuration;
}

function removeEnemy() { if (enemy) enemy.psx.dispose(); enemy = null; }

function startRespawn() {
  if (isRespawning) return;
  isRespawning = true;
  respawnTimer = 2000;
  triggerReggae(1.0, 700);
  damageFlash = 0.8;
  stolenBannerEl.classList.add('active');
  removeEnemy();
}

function finishRespawn() {
  isRespawning = false;
  respawnTimer = 0;
  guardHP = 5;
  stopped = 0;
  stolen = 0;
  savedHarvestValue = 0;
  attackTimer = 0;
  attackCooldown = 0;
  damageFlash = 0;
  spawnTimer = 0;
  stolenBannerEl.classList.remove('active');
  setPlayerAnim('sit');
}

function chooseSpawnCell() {
  const options = cells.filter(function(cell) {
    return !cell.center && cell.id !== lastSpawnId;
  });
  return options[Math.floor(Math.random() * options.length)];
}

function spawnEnemy() {
  if (enemy || isRespawning) return;
  const cell = chooseSpawnCell();
  lastSpawnId = cell.id;
  const sprite = PSXSprite(scene, {
    name: 'andrey_grid_' + Date.now(),
    texture: '../assets/sprites/andrey_livan_enemy.png',
    cellW: 260,
    cellH: 576,
    cols: 8,
    rows: 1,
    width: 4.8,
    height: 4.0,
    pos: [cell.x, 2.05, cell.z],
    anims: { walk: [1, 2], attack: [3, 7], pain: [0, 0], death: [0, 0] }
  });
  sprite.play('walk', 5);
  enemy = { cell, psx: sprite, timer: 2200, seed: Math.random() * Math.PI * 2 };
}

function refreshCells() {
  for (let i = 0; i < cells.length; i++) {
    const cell = cells[i];
    if (cell.center) cell.tile.material = mats.center;
    else if (enemy && enemy.cell.id === cell.id) cell.tile.material = mats.threat;
    else if (selection.id === cell.id) cell.tile.material = mats.selected;
    else cell.tile.material = mats.cell;
  }
  selector.position.set(selection.x, 0.64, selection.z);
}

function setSelection(row, col) {
  const cell = cellMap[row + '_' + col];
  if (!cell || cell.center) return;
  selection = cell;
  playerFacing = Math.atan2(selection.x, selection.z);
  refreshCells();
}

function moveSelection(dx, dy) {
  let row = Math.max(0, Math.min(2, selection.row + dy));
  let col = Math.max(0, Math.min(2, selection.col + dx));
  if (row === 1 && col === 1) {
    const skipRow = Math.max(0, Math.min(2, row + dy));
    const skipCol = Math.max(0, Math.min(2, col + dx));
    if (skipRow === 1 && skipCol === 1) return;
    row = skipRow;
    col = skipCol;
  }
  setSelection(row, col);
}

function attackSelected() {
  if (isRespawning || attackCooldown > 0) return;
  attackCooldown = 340;
  attackTimer = 150;
  setPlayerAnim('attack');
  strike.position.set(selection.x, 0.66, selection.z);
  strike.scaling.setAll(1);
  strike.isVisible = true;

  if (enemy && enemy.cell.id === selection.id) {
    triggerReggae(0.9, 240);
    removeEnemy();
    stopped += 1;
    savedHarvestValue += harvestReward;
    spawnTimer = 1000;
  } else {
    triggerReggae(0.45, 140);
  }
}

window.addEventListener('keydown', function(e) {
  if (e.repeat) return;
  if (e.code === 'KeyW' || e.code === 'ArrowUp') moveSelection(0, 1);
  else if (e.code === 'KeyS' || e.code === 'ArrowDown') moveSelection(0, -1);
  else if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveSelection(-1, 0);
  else if (e.code === 'KeyD' || e.code === 'ArrowRight') moveSelection(1, 0);
  else if (e.code === 'Space' || e.code === 'Enter' || e.code === 'NumpadEnter') { e.preventDefault(); attackSelected(); }
});

setPlayerAnim('sit');
refreshCells();
spawnEnemy();

let t = 0;
scene.registerBeforeRender(function() {
  const dt = engine.getDeltaTime();
  const dtS = dt * 0.001;
  t += dtS;

  if (isRespawning) {
    respawnTimer -= dt;
    if (respawnTimer <= 0) finishRespawn();
  } else if (!enemy) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnTimer = 1000;
      spawnEnemy();
    }
  }

  attackCooldown = Math.max(0, attackCooldown - dt);
  attackTimer = Math.max(0, attackTimer - dt);
  if (attackTimer > 0) {
    strike.scaling.setAll(1 + (1 - attackTimer / 150) * 0.18);
    mats.strike.alpha = 0.42 * (attackTimer / 150);
  } else {
    strike.isVisible = false;
    mats.strike.alpha = 0.42;
    setPlayerAnim('sit');
  }

  selector.position.y = 0.64 + Math.sin(t * 4.5) * 0.04;
  playerSprite.spr.position.set(0, 2.15 + Math.sin(t * 1.6) * 0.03, 0);
  playerSprite.setDir(playerFacing);
  playerSprite.update(dt, camera);

  if (enemy) {
    enemy.timer -= dt;
    const spr = enemy.psx.spr;
    spr.position.set(enemy.cell.x, 2.05 + Math.sin(t * 4 + enemy.seed) * 0.08, enemy.cell.z);
    enemy.psx.setDir(Math.atan2(-enemy.cell.x, -enemy.cell.z));
    if (enemy.timer < 700) enemy.psx.play('attack', 8);
    else enemy.psx.play('walk', 5);
    enemy.psx.update(dt, camera);

    if (enemy.timer <= 0) {
      stolen += 1;
      guardHP -= 1;
      damageFlash = 0.55;
      triggerReggae(1.0, 320);
      removeEnemy();
      if (guardHP <= 0) startRespawn();
      else spawnTimer = 1000;
    }
  }

  refreshCells();

  damageFlash = Math.max(0, damageFlash - dtS * 1.6);
  damageEl.style.background = 'rgba(160,0,0,' + damageFlash.toFixed(3) + ')';
  if (reggaeTimer > 0) {
    reggaeTimer = Math.max(0, reggaeTimer - dt);
    const p = reggaeTimer / reggaeDuration;
    const alpha = (0.52 * p * reggaeStrength);
    const stripeA = (0.4 * p * reggaeStrength).toFixed(3);
    const stripeB = (0.3 * p * reggaeStrength).toFixed(3);
    const stripeC = (0.34 * p * reggaeStrength).toFixed(3);
    const shift = Math.sin(t * 20) * 18 * reggaeStrength;
    reggaeEl.style.opacity = alpha.toFixed(3);
    reggaeEl.style.transform = 'translateX(' + shift.toFixed(2) + 'px)';
    reggaeEl.style.background =
      'linear-gradient(90deg,' +
      'rgba(255,36,36,' + stripeA + ') 0%,' +
      'rgba(255,230,64,' + stripeB + ') 38%,' +
      'rgba(40,255,110,' + stripeC + ') 70%,' +
      'rgba(255,36,36,' + stripeA + ') 100%)';
    if (reggaeTimer <= 0) {
      reggaeStrength = 0;
      reggaeEl.style.opacity = '0';
      reggaeEl.style.transform = '';
      reggaeEl.style.background = 'transparent';
    }
  }

  pipeline.chromaticAberration.aberrationAmount += (1.05 - pipeline.chromaticAberration.aberrationAmount) * 0.08;
  pipeline.bloomWeight += (0.36 - pipeline.bloomWeight) * 0.08;
  arenaLamp.intensity = 1.75 + Math.sin(t * 1.2) * 0.04;

  hudEl.innerHTML =
    'STOPPED ' + stopped +
    ' // STOLEN ' + stolen +
    ' // HP ' + guardHP +
    ' // TARGET ' + selection.id +
    (enemy ? ' // THREAT ' + enemy.cell.id : '') +
    (isRespawning ? ' // RESPAWN ' + Math.max(0, Math.ceil(respawnTimer / 1000)) : '') +
    '<br>ПОБИТО ВРАГОВ ' + stopped +
    ' // СПАСЕНО УРОЖАЯ ₽' + savedHarvestValue;
});

engine.runRenderLoop(function() { scene.render(); });
window.addEventListener('resize', function() { engine.resize(); });
</script>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var embedded=p.get('embedded')==='1';
  var preview=p.get('preview')==='1';
  if(embedded){
    var mc=document.getElementById('mode-chip');
    if(mc)mc.style.display='none';
  }
  if(preview){
    var h=document.getElementById('hud');if(h)h.style.display='none';
    var hi=document.getElementById('hint');if(hi)hi.style.display='none';
    var tc=document.getElementById('touch-controls');if(tc)tc.style.display='none';
  }
})();
</script>
</body>
</html>
