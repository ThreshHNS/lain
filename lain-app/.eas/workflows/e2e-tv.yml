name: E2E Smoke
on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}
defaults:
  tools:
    node: '22'
jobs:
  verify_js:
    name: Verify app tests
    type: custom
    runs_on: linux-medium
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run app unit tests
        run: npm test -- --runInBand

  build_android_maestro:
    name: Build Android for Maestro
    needs:
      - verify_js
    type: build
    params:
      platform: android
      profile: android-maestro

  maestro_smoke:
    name: Run Maestro smoke
    needs:
      - build_android_maestro
    type: maestro
    runs_on: linux-large-nested-virtualization
    params:
      build_id: ${{ needs.build_android_maestro.outputs.build_id }}
      flow_path: ./maestro/flows
      include_tags:
        - smoke
      retries: 1
      record_screen: false
      device_identifier: pixel_6
      output_format: junit
